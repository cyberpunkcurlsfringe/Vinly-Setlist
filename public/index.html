<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vinly Setlist Player</title>
  <!-- Core styles -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="vinly-background.css">
  <link rel="stylesheet" href="vinly-setlist-ui1.css">
  <link rel="stylesheet" href="vinly-setlist-ui2.css">
  <!-- Footer + Floating video frame styles -->
  <link rel="stylesheet" href="webtv-ui.css">
</head>
<body>
  <div class="page-shell">
    <!-- ARTIST CAROUSEL -->
    <div id="artist-carousel">
      <button class="carousel-btn" id="prev-artist">←</button>
      <div class="artist-carousel-item">
        <img class="artist-cover" id="artist-cover" src="" alt="Artist cover">
        <span id="artist-name"></span>
      </div>
      <button class="carousel-btn" id="next-artist">→</button>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <div id="left-column">
        <!-- Albums -->
        <div id="albums">
          <div id="albums-header"><h2>Albums</h2></div>
          <div class="album-row" id="album-row"></div>
        </div>
      </div>

      <!-- Tracks -->
      <div id="tracks-panel">
        <div id="tracks-header"><h2>Tracks</h2></div>
        <div id="tracks"></div>
      </div>
    </div>
  </div>

  <!-- === Audio Footer === -->
  <div class="player-shell-inline collapsed" id="audio-footer" aria-hidden="true">
    <div class="player-left">
      <div class="player-label">Now Playing</div>
      <div class="player-track-title" id="player-track-title">—</div>
      <!-- Controls stacked below title -->
      <div class="control-bar">
        <button class="play-btn" id="play-btn" aria-label="Play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="time-display" id="time-current">0:00</div>
        <div class="progress-container" id="progress-container">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-display" id="time-total">0:00</div>
      </div>
    </div>
    <div class="player-right">
      <button class="lyrics-btn" id="lyrics-btn">Lyrics</button>
    </div>
    <div class="media-container">
      <audio id="audioPlayer"></audio>
    </div>
  </div>

<!-- === WebTV Video Footer === -->
<div class="player-shell-inline collapsed" id="webtv-footer" aria-hidden="true">
  <div class="player-left">
    <div class="player-label">Now Playing</div>
    <div class="player-track-title" id="webtv-track-title">—</div>
    <!-- Control bar stripped down: no play/pause, no progress, no time -->
    <div class="control-bar"></div>
  </div>
  <div class="player-right">
    <div class="subtitle-controls">
      <button id="subtitle-btn" class="subtitle-btn">Subtitle</button>
      <label for="subtitle-size">Font size</label>
      <input type="range" id="subtitle-size" min="14" max="72" value="22" />
    </div>
  </div>
</div>


  <!-- === Floating WebTV Video Frame === -->
  <div class="webtv-frame" id="webtv-frame" aria-hidden="true">
    <div class="webtv-frame-header" id="webtv-frame-header">
      <span class="webtv-frame-title">Now Playing</span>
      <div class="webtv-frame-controls">
        <button id="webtv-fullscreen">⛶</button>
        <button id="webtv-close">×</button>
      </div>
    </div>
    <div id="webtv-stage">
    <video id="webtv-video"
       preload="none"
       controls
       controlsList="nodownload"
       playsinline>
     </video>
      <!-- Captions overlay floats above video -->
      <div id="subtitle-overlay" class="subtitle-overlay"></div>
    </div>
  </div>

  <!-- Lyrics Overlay -->
  <div class="lyrics-overlay" id="lyrics-overlay" aria-hidden="true">
    <button class="close-btn" id="close-lyrics">×</button>
    <h2>Lyrics</h2>
    <div class="lyrics-overlay-content" id="lyrics-content">
      <div class="lyrics-meta"></div>
      <div class="lyrics-title"></div>
      <div class="lyrics-lines"></div>
    </div>
  </div>

  <!-- Hidden media container (no longer needed for video, but kept for audio) -->
  <div id="hidden-media-container"></div>

  <!-- App logic scripts -->
  <script src="webtv-ui.js"></script>
  <script src="vinly-setlist.js"></script>
  <script src="vinly-ui.js"></script>
  <script src="vinly-lyrics.js"></script>
  <script src="vinly-background.js"></script>
  <script src="vinly-setlist-ui1.js"></script>
  <script src="vinly-setlist-ui2.js"></script>
</body>
</html>
